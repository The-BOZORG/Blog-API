services:
  mongo:
    container_name: blog-db
    image: mongo:latest
    restart: unless-stopped
    env_file: .env.development
    ports:
      - '27017:27017'
    volumes:
      - ./data:/data/db
    networks:
      - blog-app-networks

  api:
    container_name: api
    build: .
    restart: always
    env_file: .env.development
    ports:
      - '3000:3000'
    volumes:
      - ./:/usr/src/app
    depends_on:
      - mongo
    networks:
      - blog-app-networks

networks:
  blog-app-networks:
    driver: bridge
